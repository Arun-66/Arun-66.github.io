site_name: "Devesh Bhaskaran"
author: "Devesh Bhaskaran"
base_url: "https://devesh-b.github.io"
description: "Digital Design Engineer at Analog Devices India — working at the boundary where digital, analog, and RF have to learn to live together."

theme:
  default: "academic-light"
  include:
    - "academic-light"
    - "academic-dark"
  custom:
    academic-light: |
      color-scheme: light;
      --color-base-100: #EDE4D8;
      --color-base-200: #E2D8CA;
      --color-base-300: #D3C8B8;
      --color-base-content: #1A1A1A;
      --color-primary: #3B4A6B;
      --color-primary-content: #FFFFFF;
      --color-secondary: #6B7A9A;
      --color-secondary-content: #FFFFFF;
      --color-accent: #3B4A6B;
      --color-accent-content: #FFFFFF;
      --color-neutral: #DAD0C4;
      --color-neutral-content: #1A1A1A;
      --color-info: oklch(70% 0.10 220);
      --color-info-content: oklch(20% 0.05 220);
      --color-success: oklch(65% 0.12 150);
      --color-success-content: oklch(20% 0.05 150);
      --color-warning: #f59e0b;
      --color-warning-content: #1a1a1a;
      --color-error: #dc2626;
      --color-error-content: #ffffff;
      --radius-selector: 0.25rem;
      --radius-field: 0.25rem;
      --radius-box: 0.375rem;
      --border: 1px;
      --depth: 0;
      --noise: 0;
    academic-dark: |
      color-scheme: dark;
      --color-base-100: #131313;
      --color-base-200: #1E1E1E;
      --color-base-300: #282828;
      --color-base-content: #E8E4DD;
      --color-primary: #7B8FC4;
      --color-primary-content: #0D1117;
      --color-secondary: #5A6A9A;
      --color-secondary-content: #E8E4DD;
      --color-accent: #7B8FC4;
      --color-accent-content: #0D1117;
      --color-neutral: #282828;
      --color-neutral-content: #E8E4DD;
      --color-info: oklch(70% 0.10 220);
      --color-info-content: oklch(95% 0.02 220);
      --color-success: oklch(65% 0.12 150);
      --color-success-content: oklch(95% 0.02 150);
      --color-warning: #f59e0b;
      --color-warning-content: #1a1a1a;
      --color-error: #ef4444;
      --color-error-content: #ffffff;
      --radius-selector: 0.25rem;
      --radius-field: 0.25rem;
      --radius-box: 0.375rem;
      --border: 1px;
      --depth: 0;
      --noise: 0;

fonts:
  imports:
    - "https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
  families:
    body: "'DM Sans', system-ui, sans-serif"
    heading: "'Plus Jakarta Sans', system-ui, sans-serif"
    mono: "'IBM Plex Mono', ui-monospace, monospace"

syntax:
  pygments_theme: "friendly"

markdown:
  extensions:
    - fenced_code
    - codehilite
    - footnotes
    - tables
    - attr_list
    - sane_lists
    - md_in_html
    - toc:
        permalink: false

images:
  formats:
    - webp
    - jpg

navigation:
  - name: "About"
    url: "/"
  - name: "Publications"
    url: "/publications/"
  - name: "Projects"
    url: "/projects/"
  - name: "Teaching"
    url: "/teaching/"
  - name: "Blog"
    url: "/blog/"
  - name: "Collaborate"
    url: "/collaborate/"
