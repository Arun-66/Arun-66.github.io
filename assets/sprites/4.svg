<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" width="80" height="120">
  <!-- Stage 4: Student holding PYNQ FPGA board -->
  <!-- Head -->
  <circle cx="40" cy="21" r="13" fill="#FDBCB4" stroke="#333" stroke-width="1.5"/>
  <!-- Hair -->
  <path d="M27 17 Q40 6 53 17 Q52 10 40 8 Q28 10 27 17Z" fill="#1A0A00"/>
  <!-- Eyes (curious, wide) -->
  <circle cx="35" cy="20" r="2.2" fill="#333"/>
  <circle cx="45" cy="20" r="2.2" fill="#333"/>
  <!-- Smile (excited) -->
  <path d="M34 26 Q40 31 46 26" stroke="#333" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="37" y="33" width="6" height="5" rx="1" fill="#FDBCB4"/>
  <!-- Body (lab coat style - white shirt) -->
  <rect x="27" y="37" width="26" height="23" rx="3" fill="#F0F0F0" stroke="#333" stroke-width="1"/>
  <line x1="40" y1="37" x2="40" y2="60" stroke="#CCC" stroke-width="1"/>
  <!-- Pocket -->
  <rect x="28" y="45" width="7" height="6" rx="1" fill="none" stroke="#CCC" stroke-width="0.8"/>
  <!-- Dark pants -->
  <rect x="29" y="58" width="9" height="22" rx="2" fill="#2C2C3E" stroke="#333" stroke-width="1"/>
  <rect x="42" y="58" width="9" height="22" rx="2" fill="#2C2C3E" stroke="#333" stroke-width="1"/>
  <!-- Shoes -->
  <ellipse cx="34" cy="81" rx="5" ry="3" fill="#333"/>
  <ellipse cx="46" cy="81" rx="5" ry="3" fill="#333"/>
  <!-- Arms holding FPGA board -->
  <line x1="27" y1="42" x2="12" y2="55" stroke="#FDBCB4" stroke-width="4" stroke-linecap="round"/>
  <line x1="53" y1="42" x2="68" y2="55" stroke="#FDBCB4" stroke-width="4" stroke-linecap="round"/>
  <!-- PYNQ-Z2 board -->
  <rect x="5" y="52" width="28" height="18" rx="2" fill="#E04A2F" stroke="#333" stroke-width="1"/>
  <rect x="7" y="54" width="10" height="7" rx="1" fill="#1a1a2e"/>
  <circle cx="28" cy="56" r="2" fill="#FFD700" stroke="#333" stroke-width="0.5"/>
  <circle cx="28" cy="62" r="1.5" fill="#00AA00"/>
  <text x="17" y="68" font-size="3.5" text-anchor="middle" fill="white" font-family="monospace">PYNQ</text>
</svg>
