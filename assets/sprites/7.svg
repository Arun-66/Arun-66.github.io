  <text x="32" y="50" font-size="2.5" text-anchor="middle" fill="white" font-family="sans-serif">ID</text>
  <line x1="32" y1="46" x2="32" y2="42" stroke="#555" stroke-width="0.5"/>
  <!-- Pants (formal) -->
