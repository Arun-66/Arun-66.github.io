<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" width="80" height="120">
  <!-- Stage 1: School kid with backpack -->
  <!-- Head -->
  <circle cx="40" cy="22" r="13" fill="#FDBCB4" stroke="#333" stroke-width="1.5"/>
  <!-- Hair -->
  <path d="M27 18 Q40 8 53 18 Q53 12 40 10 Q27 12 27 18Z" fill="#2C1810"/>
  <!-- Eyes -->
  <circle cx="35" cy="21" r="2" fill="#333"/>
  <circle cx="45" cy="21" r="2" fill="#333"/>
  <!-- Smile -->
  <path d="M35 27 Q40 31 45 27" stroke="#333" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Body (school uniform - white shirt, dark pants) -->
  <rect x="30" y="38" width="20" height="22" rx="3" fill="#4A7FCB" stroke="#333" stroke-width="1"/>
  <!-- Collar -->
  <path d="M38 38 L40 44 L42 38" fill="white" stroke="#ccc" stroke-width="0.5"/>
  <!-- Pants -->
  <rect x="30" y="58" width="8" height="22" rx="2" fill="#2C2C6E" stroke="#333" stroke-width="1"/>
  <rect x="42" y="58" width="8" height="22" rx="2" fill="#2C2C6E" stroke="#333" stroke-width="1"/>
  <!-- Shoes -->
  <ellipse cx="34" cy="81" rx="5" ry="3" fill="#333"/>
  <ellipse cx="46" cy="81" rx="5" ry="3" fill="#333"/>
  <!-- Arms -->
  <line x1="30" y1="42" x2="18" y2="56" stroke="#FDBCB4" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="42" x2="62" y2="56" stroke="#FDBCB4" stroke-width="4" stroke-linecap="round"/>
  <!-- School bag (right side) -->
  <rect x="52" y="38" width="12" height="16" rx="2" fill="#E8502A" stroke="#333" stroke-width="1"/>
  <rect x="54" y="35" width="4" height="5" rx="1" fill="#C43E1C" stroke="#333" stroke-width="0.8"/>
  <line x1="57" y1="42" x2="57" y2="52" stroke="#C43E1C" stroke-width="1"/>
  <!-- Neck -->
  <rect x="37" y="34" width="6" height="5" rx="1" fill="#FDBCB4"/>
</svg>
