<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" width="90" height="150">
  <!-- Stage 2: Deep in books — late night study sessions begin -->

  <ellipse cx="60" cy="192" rx="22" ry="5" fill="#00000015"/>

  <!-- Legs -->
  <rect x="46" y="118" width="13" height="52" rx="4" fill="#2C3E50"/>
  <rect x="62" y="118" width="13" height="52" rx="4" fill="#253545"/>

  <!-- Shoes -->
  <ellipse cx="52" cy="172" rx="9" ry="5" fill="#333"/>
  <ellipse cx="68" cy="172" rx="9" ry="5" fill="#2A2A2A"/>
  <rect x="44" y="168" width="16" height="4" rx="2" fill="#2A2A2A"/>
  <rect x="60" y="168" width="16" height="4" rx="2" fill="#222"/>

  <!-- Body — hoodie, leaning forward slightly -->
  <rect x="39" y="68" width="38" height="52" rx="7" fill="#3D4F6B"/>
  <!-- Hoodie pocket -->
  <path d="M46 100 Q60 97 74 100 L74 115 Q60 117 46 115Z" fill="#344460" stroke="#2C3A55" stroke-width="0.8"/>
  <!-- Hood strings -->
  <line x1="56" y1="70" x2="54" y2="85" stroke="#2C3A55" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="64" y1="70" x2="66" y2="85" stroke="#2C3A55" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="54" cy="86" r="2" fill="#253040"/>
  <circle cx="66" cy="86" r="2" fill="#253040"/>

  <!-- Left arm holding book stack -->
  <rect x="20" y="72" width="20" height="12" rx="5" fill="#FDBCB4"/>
  <!-- Stack of books in left hand -->
  <rect x="4" y="78" width="22" height="6" rx="1.5" fill="#E8502A"/>
  <rect x="4" y="84" width="22" height="6" rx="1.5" fill="#4A7FCB"/>
  <rect x="4" y="90" width="22" height="6" rx="1.5" fill="#2ECC71"/>
  <!-- Book spines -->
  <line x1="6" y1="78" x2="6" y2="96" stroke="#C0402A" stroke-width="1"/>
  <line x1="6" y1="84" x2="6" y2="90" stroke="#3A6CB0" stroke-width="1"/>

  <!-- Right arm -->
  <rect x="77" y="72" width="14" height="38" rx="5" fill="#FDBCB4"/>
  <ellipse cx="84" cy="111" rx="6" ry="5" fill="#FDBCB4"/>

  <!-- Neck -->
  <rect x="55" y="55" width="10" height="15" rx="3" fill="#FDBCB4"/>

  <!-- Head -->
  <ellipse cx="60" cy="38" rx="22" ry="24" fill="#FDBCB4"/>

  <!-- Hair — same but a bit tired -->
  <path d="M38 30 Q40 10 60 8 Q80 10 82 30 Q78 15 60 14 Q42 15 38 30Z" fill="#1A0800"/>
  <path d="M38 24 Q37 18 39 13" stroke="#1A0800" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- A bit of messy hair -->
  <path d="M68 10 Q72 7 74 10" stroke="#1A0800" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Ears -->
  <ellipse cx="38" cy="38" rx="4" ry="5" fill="#F0A898"/>
  <ellipse cx="82" cy="38" rx="4" ry="5" fill="#F0A898"/>

  <!-- Eyes — focused, slightly tired -->
  <ellipse cx="52" cy="36" rx="5" ry="4.5" fill="white"/>
  <ellipse cx="68" cy="36" rx="5" ry="4.5" fill="white"/>
  <circle cx="53" cy="37" r="3.5" fill="#2C1A0E"/>
  <circle cx="69" cy="37" r="3.5" fill="#2C1A0E"/>
  <circle cx="54.5" cy="35.5" r="1.2" fill="white"/>
  <circle cx="70.5" cy="35.5" r="1.2" fill="white"/>
  <!-- Slight bags under eyes -->
  <path d="M48 41 Q52 43 56 41" stroke="#D09080" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M64 41 Q68 43 72 41" stroke="#D09080" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Eyebrows — slightly furrowed -->
  <path d="M47 28 Q52 26 57 28" stroke="#1A0800" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M63 28 Q68 27 73 28" stroke="#1A0800" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M58 43 Q60 47 62 43" stroke="#E09080" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Neutral determined expression -->
  <path d="M51 52 Q60 55 69 52" stroke="#C07060" stroke-width="1.4" fill="none" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="45" cy="46" rx="5" ry="3" fill="#FFB0A0" opacity="0.3"/>
  <ellipse cx="75" cy="46" rx="5" ry="3" fill="#FFB0A0" opacity="0.3"/>
</svg>
