<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" width="90" height="150">
  <!-- Stage 5: Teaching Assistant — confident, pointer in hand -->

  <ellipse cx="60" cy="192" rx="22" ry="5" fill="#00000015"/>

  <!-- Legs — smart dark trousers -->
  <rect x="46" y="118" width="13" height="52" rx="4" fill="#1A2538"/>
  <rect x="62" y="118" width="13" height="52" rx="4" fill="#162030"/>
  <!-- Trouser crease -->
  <line x1="52" y1="118" x2="52" y2="170" stroke="#0F1820" stroke-width="1" opacity="0.4"/>
  <line x1="68" y1="118" x2="68" y2="170" stroke="#0F1820" stroke-width="1" opacity="0.4"/>

  <!-- Shoes — dress shoes -->
  <ellipse cx="52" cy="173" rx="10" ry="5" fill="#0A0A1A"/>
  <ellipse cx="68" cy="173" rx="10" ry="5" fill="#080818"/>
  <rect x="43" y="169" width="18" height="4" rx="2" fill="#080818"/>
  <rect x="59" y="169" width="18" height="4" rx="2" fill="#060610"/>
  <!-- Shine on shoes -->
  <ellipse cx="49" cy="170" rx="3" ry="1.5" fill="white" opacity="0.15"/>
  <ellipse cx="65" cy="170" rx="3" ry="1.5" fill="white" opacity="0.15"/>

  <!-- Body — collared shirt, tucked in -->
  <rect x="40" y="65" width="36" height="55" rx="6" fill="#2E6DA4"/>
  <!-- Collar -->
  <path d="M53 65 L50 74 L60 70 L70 74 L67 65" fill="#F8F8F8" stroke="#DDD" stroke-width="0.8"/>
  <!-- Button line -->
  <line x1="60" y1="74" x2="60" y2="118" stroke="#2260A0" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- Buttons -->
  <circle cx="60" cy="80" r="1.5" fill="#1A5090"/>
  <circle cx="60" cy="88" r="1.5" fill="#1A5090"/>
  <circle cx="60" cy="96" r="1.5" fill="#1A5090"/>

  <!-- Belt -->
  <rect x="40" y="117" width="36" height="5" rx="1" fill="#0A0A1A"/>
  <rect x="57" y="116" width="6" height="7" rx="1" fill="#888"/>
  <rect x="58" y="117" width="4" height="5" rx="0.5" fill="#555"/>

  <!-- Left arm — raised, holding pointer -->
  <rect x="28" y="67" width="13" height="42" rx="5" fill="#FDBCB4" transform="rotate(-20 28 67)"/>
  <ellipse cx="22" cy="100" rx="6" ry="5" fill="#FDBCB4"/>

  <!-- Pointer/pen in hand -->
  <rect x="6" y="88" width="18" height="3" rx="1.5" fill="#333" transform="rotate(-30 6 88)"/>
  <polygon points="5,96 3,100 8,98" fill="#E04A2F" transform="rotate(-30 5 96)"/>

  <!-- Right arm — at side, natural -->
  <rect x="77" y="67" width="13" height="48" rx="5" fill="#FDBCB4"/>
  <ellipse cx="83" cy="116" rx="6" ry="5" fill="#FDBCB4"/>

  <!-- Neck -->
  <rect x="55" y="55" width="10" height="12" rx="3" fill="#FDBCB4"/>

  <!-- Head -->
  <ellipse cx="60" cy="38" rx="22" ry="24" fill="#FDBCB4"/>

  <!-- Hair — neat and combed -->
  <path d="M38 28 Q40 9 60 8 Q80 9 82 28 Q80 14 60 13 Q40 14 38 28Z" fill="#1A0800"/>
  <!-- Clean side part -->
  <path d="M46 14 Q50 12 56 13" stroke="#1A0800" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Ears -->
  <ellipse cx="38" cy="40" rx="4" ry="5" fill="#F0A898"/>
  <ellipse cx="82" cy="40" rx="4" ry="5" fill="#F0A898"/>

  <!-- Eyes — confident, direct -->
  <ellipse cx="52" cy="37" rx="5" ry="5" fill="white"/>
  <ellipse cx="68" cy="37" rx="5" ry="5" fill="white"/>
  <circle cx="53" cy="38" r="3.5" fill="#2C1A0E"/>
  <circle cx="69" cy="38" r="3.5" fill="#2C1A0E"/>
  <circle cx="54.5" cy="36.5" r="1.2" fill="white"/>
  <circle cx="70.5" cy="36.5" r="1.2" fill="white"/>

  <!-- Eyebrows — confident, slightly raised -->
  <path d="M47 29 Q52 27 57 29" stroke="#1A0800" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M63 29 Q68 27 73 29" stroke="#1A0800" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M58 44 Q60 48 62 44" stroke="#E09080" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Confident smile -->
  <path d="M51 52 Q60 58 69 52" stroke="#C07060" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="45" cy="47" rx="5" ry="3" fill="#FFB0A0" opacity="0.3"/>
  <ellipse cx="75" cy="47" rx="5" ry="3" fill="#FFB0A0" opacity="0.3"/>
</svg>
