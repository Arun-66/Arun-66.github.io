<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" width="80" height="120">
  <!-- Stage 5: Teaching Assistant at whiteboard -->
  <!-- Head -->
  <circle cx="40" cy="21" r="13" fill="#FDBCB4" stroke="#333" stroke-width="1.5"/>
  <!-- Hair -->
  <path d="M27 17 Q40 6 53 17 Q52 10 40 8 Q28 10 27 17Z" fill="#1A0A00"/>
  <!-- Eyes (confident) -->
  <circle cx="35" cy="20" r="2" fill="#333"/>
  <circle cx="45" cy="20" r="2" fill="#333"/>
  <!-- Smile -->
  <path d="M35 26 Q40 30 45 26" stroke="#333" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="37" y="33" width="6" height="5" rx="1" fill="#FDBCB4"/>
  <!-- Body (smart casual - collared shirt) -->
  <rect x="27" y="37" width="26" height="23" rx="3" fill="#2E6DA4" stroke="#333" stroke-width="1"/>
  <!-- Collar -->
  <path d="M37 37 L40 43 L43 37" fill="white" stroke="#ddd" stroke-width="0.5"/>
  <!-- Dark pants -->
  <rect x="29" y="58" width="9" height="22" rx="2" fill="#2C2C3E" stroke="#333" stroke-width="1"/>
  <rect x="42" y="58" width="9" height="22" rx="2" fill="#2C2C3E" stroke="#333" stroke-width="1"/>
  <!-- Shoes -->
  <ellipse cx="34" cy="81" rx="5" ry="3" fill="#1A1A1A"/>
  <ellipse cx="46" cy="81" rx="5" ry="3" fill="#1A1A1A"/>
  <!-- Arm pointing -->
  <line x1="27" y1="42" x2="10" y2="50" stroke="#FDBCB4" stroke-width="4" stroke-linecap="round"/>
  <line x1="53" y1="42" x2="65" y2="52" stroke="#FDBCB4" stroke-width="4" stroke-linecap="round"/>
  <!-- Whiteboard with RTL diagram -->
  <rect x="2" y="38" width="18" height="20" rx="1" fill="white" stroke="#888" stroke-width="1"/>
  <!-- RTL content on board -->
  <rect x="4" y="40" width="6" height="4" rx="0.5" fill="none" stroke="#2E6DA4" stroke-width="0.8"/>
  <rect x="12" y="40" width="6" height="4" rx="0.5" fill="none" stroke="#2E6DA4" stroke-width="0.8"/>
  <line x1="10" y1="42" x2="12" y2="42" stroke="#333" stroke-width="0.8"/>
  <line x1="15" y1="44" x2="15" y2="48" stroke="#333" stroke-width="0.8"/>
  <rect x="12" y="48" width="6" height="4" rx="0.5" fill="none" stroke="#E04A2F" stroke-width="0.8"/>
  <text x="11" y="60" font-size="3" fill="#333" font-family="monospace">RISC-V</text>
</svg>
