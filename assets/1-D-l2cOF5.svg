<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" width="90" height="150">
  <!-- Stage 1: Freshman — casual, backpack, first day energy -->

  <!-- Shadow -->
  <ellipse cx="60" cy="192" rx="22" ry="5" fill="#00000015"/>

  <!-- Backpack (behind body) -->
  <rect x="72" y="68" width="18" height="28" rx="4" fill="#E04A2F"/>
  <rect x="73" y="65" width="5" height="8" rx="2" fill="#C43E1C"/>
  <rect x="73" y="80" width="16" height="1.5" fill="#C43E1C"/>
  <rect x="74" y="72" width="3" height="20" rx="1.5" fill="#C43E1C"/>
  <rect x="80" y="72" width="3" height="20" rx="1.5" fill="#C43E1C"/>

  <!-- Legs — jeans -->
  <rect x="46" y="118" width="13" height="52" rx="4" fill="#4169B0"/>
  <rect x="62" y="118" width="13" height="52" rx="4" fill="#3D60A0"/>
  <!-- Jean seam -->
  <line x1="52" y1="118" x2="52" y2="170" stroke="#3560A0" stroke-width="1" opacity="0.4"/>
  <line x1="68" y1="118" x2="68" y2="170" stroke="#3059A0" stroke-width="1" opacity="0.4"/>

  <!-- Shoes — white sneakers -->
  <ellipse cx="52" cy="172" rx="9" ry="5" fill="#F0F0F0"/>
  <ellipse cx="68" cy="172" rx="9" ry="5" fill="#E8E8E8"/>
  <rect x="44" y="168" width="16" height="4" rx="2" fill="#E0E0E0"/>
  <rect x="60" y="168" width="16" height="4" rx="2" fill="#D8D8D8"/>
  <line x1="46" y1="169" x2="58" y2="169" stroke="#AAA" stroke-width="0.7"/>
  <line x1="62" y1="169" x2="74" y2="169" stroke="#AAA" stroke-width="0.7"/>

  <!-- Body — fresh white tee -->
  <rect x="40" y="68" width="36" height="52" rx="6" fill="#FFFFFF"/>
  <rect x="40" y="68" width="36" height="52" rx="6" fill="none" stroke="#E8E8E8" stroke-width="1"/>
  <!-- Collar -->
  <path d="M52 68 Q60 76 68 68" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Left arm (swinging slightly) -->
  <rect x="28" y="70" width="12" height="38" rx="6" fill="#FDBCB4"/>
  <!-- Right arm (holding strap) -->
  <rect x="76" y="70" width="12" height="30" rx="6" fill="#FDBCB4"/>

  <!-- Hands -->
  <ellipse cx="34" cy="109" rx="6" ry="5" fill="#FDBCB4"/>
  <ellipse cx="82" cy="101" rx="6" ry="5" fill="#FDBCB4"/>

  <!-- Neck -->
  <rect x="55" y="55" width="10" height="15" rx="3" fill="#FDBCB4"/>

  <!-- Head -->
  <ellipse cx="60" cy="38" rx="22" ry="24" fill="#FDBCB4"/>

  <!-- Hair — thick, slightly messy -->
  <path d="M38 30 Q40 10 60 8 Q80 10 82 30 Q78 15 60 14 Q42 15 38 30Z" fill="#1A0800"/>
  <path d="M38 26 Q36 20 38 15 Q40 10 44 9" stroke="#1A0800" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M82 26 Q84 20 82 15 Q80 10 76 9" stroke="#1A0800" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Ears -->
  <ellipse cx="38" cy="38" rx="4" ry="5" fill="#F0A898"/>
  <ellipse cx="82" cy="38" rx="4" ry="5" fill="#F0A898"/>

  <!-- Eyes — wide, curious -->
  <ellipse cx="52" cy="36" rx="5" ry="5.5" fill="white"/>
  <ellipse cx="68" cy="36" rx="5" ry="5.5" fill="white"/>
  <circle cx="53" cy="37" r="3.5" fill="#2C1A0E"/>
  <circle cx="69" cy="37" r="3.5" fill="#2C1A0E"/>
  <circle cx="54.5" cy="35.5" r="1.2" fill="white"/>
  <circle cx="70.5" cy="35.5" r="1.2" fill="white"/>

  <!-- Eyebrows -->
  <path d="M47 29 Q52 27 57 29" stroke="#1A0800" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M63 29 Q68 27 73 29" stroke="#1A0800" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M58 43 Q60 47 62 43" stroke="#E09080" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Smile — big, excited -->
  <path d="M50 51 Q60 59 70 51" stroke="#C07060" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M50 51 Q60 59 70 51" stroke="none" fill="#F5A090" opacity="0.3"/>

  <!-- Cheeks -->
  <ellipse cx="45" cy="47" rx="5" ry="3" fill="#FFB0A0" opacity="0.4"/>
  <ellipse cx="75" cy="47" rx="5" ry="3" fill="#FFB0A0" opacity="0.4"/>

  <!-- Badge/label -->
  <text x="60" y="90" font-size="7" text-anchor="middle" fill="#666" font-family="monospace" font-weight="bold">FRESH</text>
  <text x="60" y="100" font-size="6" text-anchor="middle" fill="#888" font-family="monospace">PES '26</text>
</svg>
