<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" width="90" height="150">
  <!-- Stage 7: Intern at InCore Semiconductors — ID badge, formal, professional -->

  <ellipse cx="60" cy="192" rx="22" ry="5" fill="#00000015"/>

  <!-- Legs — formal dark trousers -->
  <rect x="46" y="118" width="13" height="52" rx="4" fill="#1A2030"/>
  <rect x="62" y="118" width="13" height="52" rx="4" fill="#151A28"/>
  <line x1="52" y1="118" x2="52" y2="170" stroke="#0F1218" stroke-width="1" opacity="0.3"/>
  <line x1="68" y1="118" x2="68" y2="170" stroke="#0F1218" stroke-width="1" opacity="0.3"/>

  <!-- Dress shoes -->
  <ellipse cx="52" cy="173" rx="10" ry="5" fill="#0A0A14"/>
  <ellipse cx="68" cy="173" rx="10" ry="5" fill="#080810"/>
  <rect x="43" y="169" width="18" height="4" rx="2" fill="#080810"/>
  <rect x="59" y="169" width="18" height="4" rx="2" fill="#050508"/>
  <ellipse cx="49" cy="170" rx="3" ry="1.5" fill="white" opacity="0.18"/>
  <ellipse cx="65" cy="170" rx="3" ry="1.5" fill="white" opacity="0.18"/>

  <!-- Body — formal white shirt, blazer -->
  <!-- Blazer -->
  <rect x="36" y="63" width="44" height="57" rx="7" fill="#2C3E50"/>
  <!-- Shirt underneath -->
  <rect x="50" y="63" width="16" height="57" fill="#F8F8F8"/>
  <!-- Lapels -->
  <path d="M50 63 L44 80 L60 73" fill="#253545" stroke="#1E2D3D" stroke-width="0.8"/>
  <path d="M70 63 L76 80 L60 73" fill="#253545" stroke="#1E2D3D" stroke-width="0.8"/>
  <!-- Shirt buttons -->
  <circle cx="60" cy="80" r="1.5" fill="#DDD"/>
  <circle cx="60" cy="89" r="1.5" fill="#DDD"/>
  <circle cx="60" cy="98" r="1.5" fill="#DDD"/>
  <!-- Tie -->
  <path d="M58 70 L56 110 L60 115 L64 110 L62 70Z" fill="#C0392B"/>
  <path d="M58 70 L62 70 L63 76 L57 76Z" fill="#A93226"/>
  <!-- Tie clip -->
  <rect x="57" y="95" width="6" height="2" rx="1" fill="#C0A040"/>

  <!-- Left arm — bent, holding coffee / at ease -->
  <rect x="24" y="65" width="14" height="50" rx="5" fill="#FDBCB4"/>
  <!-- Sleeve cuff -->
  <rect x="24" y="107" width="14" height="6" rx="2" fill="#F8F8F8" stroke="#DDD" stroke-width="0.5"/>
  <ellipse cx="31" cy="116" rx="6" ry="5" fill="#FDBCB4"/>

  <!-- Right arm -->
  <rect x="79" y="65" width="14" height="50" rx="5" fill="#FDBCB4"/>
  <rect x="79" y="107" width="14" height="6" rx="2" fill="#F8F8F8" stroke="#DDD" stroke-width="0.5"/>
  <ellipse cx="86" cy="116" rx="6" ry="5" fill="#FDBCB4"/>

  <!-- ID Badge hanging from lanyard -->
  <line x1="60" y1="63" x2="52" y2="85" stroke="#E04A2F" stroke-width="1.5"/>
  <rect x="44" y="84" width="16" height="20" rx="2" fill="white" stroke="#DDD" stroke-width="1"/>
  <!-- InCore logo hint -->
  <rect x="46" y="87" width="12" height="6" rx="1" fill="#1A3A5C"/>
  <text x="52" y="92" font-size="3.5" text-anchor="middle" fill="white" font-family="monospace">InCore</text>
  <text x="52" y="99" font-size="3" text-anchor="middle" fill="#555" font-family="sans-serif">Intern</text>

  <!-- Coffee cup in right hand -->
  <rect x="81" y="111" width="10" height="13" rx="2" fill="#F5F5F5" stroke="#CCC" stroke-width="1"/>
  <path d="M91 114 Q95 114 95 118 Q95 122 91 122" fill="none" stroke="#CCC" stroke-width="1"/>
  <rect x="82" y="112" width="8" height="4" rx="0.5" fill="#6F4E37"/>
  <rect x="82" y="116" width="8" height="1" rx="0.5" fill="#EEE"/>
  <!-- Steam -->
  <path d="M84 110 Q85 107 84 104" stroke="#BBB" stroke-width="1" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M87 110 Q88 106 87 103" stroke="#BBB" stroke-width="1" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="55" y="53" width="10" height="12" rx="3" fill="#FDBCB4"/>

  <!-- Head -->
  <ellipse cx="60" cy="36" rx="22" ry="24" fill="#FDBCB4"/>

  <!-- Hair — neat, professional -->
  <path d="M38 26 Q40 8 60 7 Q80 8 82 26 Q80 12 60 11 Q40 12 38 26Z" fill="#1A0800"/>

  <!-- Ears -->
  <ellipse cx="38" cy="38" rx="4" ry="5" fill="#F0A898"/>
  <ellipse cx="82" cy="38" rx="4" ry="5" fill="#F0A898"/>

  <!-- Eyes — professional, alert -->
  <ellipse cx="52" cy="37" rx="5" ry="4.5" fill="white"/>
  <ellipse cx="68" cy="37" rx="5" ry="4.5" fill="white"/>
  <circle cx="53" cy="38" r="3.3" fill="#2C1A0E"/>
  <circle cx="69" cy="38" r="3.3" fill="#2C1A0E"/>
  <circle cx="54.5" cy="36.5" r="1.1" fill="white"/>
  <circle cx="70.5" cy="36.5" r="1.1" fill="white"/>

  <!-- Eyebrows — confident, composed -->
  <path d="M47 29 Q52 27 57 29" stroke="#1A0800" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M63 29 Q68 27 73 29" stroke="#1A0800" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M58 44 Q60 48 62 44" stroke="#E09080" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Confident smile -->
  <path d="M51 52 Q60 58 69 52" stroke="#C07060" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="45" cy="47" rx="5" ry="3" fill="#FFB0A0" opacity="0.3"/>
  <ellipse cx="75" cy="47" rx="5" ry="3" fill="#FFB0A0" opacity="0.3"/>
</svg>
