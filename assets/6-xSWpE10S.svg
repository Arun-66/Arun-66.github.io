<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" width="90" height="150">
  <!-- Stage 6: Deep chip designer — glasses, Cadence on screen, in the zone -->

  <ellipse cx="60" cy="192" rx="22" ry="5" fill="#00000015"/>

  <!-- Legs -->
  <rect x="46" y="118" width="13" height="52" rx="4" fill="#2D3748"/>
  <rect x="62" y="118" width="13" height="52" rx="4" fill="#252E3E"/>

  <!-- Shoes -->
  <ellipse cx="52" cy="173" rx="9" ry="5" fill="#1A1A2A"/>
  <ellipse cx="68" cy="173" rx="9" ry="5" fill="#151525"/>
  <rect x="44" y="169" width="16" height="4" rx="2" fill="#151525"/>
  <rect x="60" y="169" width="16" height="4" rx="2" fill="#101018"/>

  <!-- Body — dark tech company hoodie or zip jacket -->
  <rect x="38" y="65" width="40" height="55" rx="7" fill="#2D2D42"/>
  <!-- Zip line -->
  <rect x="58" y="65" width="4" height="55" rx="1" fill="#252540"/>
  <!-- Zipper pull -->
  <rect x="57" y="88" width="6" height="5" rx="1" fill="#888"/>
  <rect x="58.5" y="89" width="3" height="3" rx="0.5" fill="#AAA"/>
  <!-- Sleeve cuffs -->
  <rect x="26" y="100" width="14" height="5" rx="2" fill="#252540"/>
  <rect x="77" y="100" width="14" height="5" rx="2" fill="#252540"/>

  <!-- Left arm — bent, elbow on invisible desk -->
  <rect x="26" y="68" width="14" height="35" rx="5" fill="#FDBCB4"/>
  <ellipse cx="33" cy="104" rx="6" ry="5" fill="#FDBCB4"/>

  <!-- Right arm — other side, same -->
  <rect x="77" y="68" width="14" height="35" rx="5" fill="#FDBCB4"/>
  <ellipse cx="84" cy="104" rx="6" ry="5" fill="#FDBCB4"/>

  <!-- Monitor floating — Cadence Innovus GDS layout -->
  <rect x="24" y="115" width="68" height="48" rx="3" fill="#0D1117" stroke="#333" stroke-width="1.5"/>
  <rect x="26" y="117" width="64" height="40" fill="#0D1117"/>
  <!-- GDS floor plan blocks -->
  <rect x="28" y="119" width="18" height="12" fill="#FF6B35" opacity="0.85"/>
  <rect x="48" y="119" width="10" height="5" fill="#4A90D9" opacity="0.85"/>
  <rect x="48" y="126" width="10" height="5" fill="#7EC8A4" opacity="0.85"/>
  <rect x="60" y="119" width="14" height="8" fill="#E8C547" opacity="0.85"/>
  <rect x="28" y="133" width="12" height="8" fill="#A855F7" opacity="0.85"/>
  <rect x="42" y="133" width="10" height="8" fill="#4A90D9" opacity="0.7"/>
  <rect x="54" y="133" width="8" height="8" fill="#FF6B35" opacity="0.7"/>
  <rect x="64" y="129" width="10" height="12" fill="#7EC8A4" opacity="0.7"/>
  <!-- Routing lines -->
  <line x1="28" y1="127" x2="74" y2="127" stroke="#FFD700" stroke-width="0.5" opacity="0.5"/>
  <line x1="42" y1="119" x2="42" y2="141" stroke="#FFD700" stroke-width="0.5" opacity="0.5"/>
  <!-- Monitor status bar -->
  <rect x="26" y="155" width="64" height="6" fill="#1A1A2E"/>
  <text x="30" y="160" font-size="4" fill="#4A90D9" font-family="monospace">Cadence Innovus  ✓ DRC</text>
  <!-- Monitor stand -->
  <rect x="54" y="163" width="8" height="6" rx="1" fill="#555"/>
  <rect x="48" y="168" width="20" height="3" rx="1.5" fill="#444"/>

  <!-- Neck -->
  <rect x="55" y="53" width="10" height="14" rx="3" fill="#FDBCB4"/>

  <!-- Head -->
  <ellipse cx="60" cy="36" rx="22" ry="24" fill="#FDBCB4"/>

  <!-- Hair -->
  <path d="M38 28 Q40 9 60 8 Q80 9 82 28 Q80 14 60 13 Q40 14 38 28Z" fill="#1A0800"/>

  <!-- Ears -->
  <ellipse cx="38" cy="38" rx="4" ry="5" fill="#F0A898"/>
  <ellipse cx="82" cy="38" rx="4" ry="5" fill="#F0A898"/>

  <!-- Glasses — engineer glasses, proper frames -->
  <rect x="43" y="31" width="15" height="11" rx="4" fill="none" stroke="#334" stroke-width="1.8"/>
  <rect x="61" y="31" width="15" height="11" rx="4" fill="none" stroke="#334" stroke-width="1.8"/>
  <rect x="43" y="31" width="15" height="11" rx="4" fill="#4A90D9" opacity="0.08"/>
  <rect x="61" y="31" width="15" height="11" rx="4" fill="#4A90D9" opacity="0.08"/>
  <line x1="58" y1="36" x2="61" y2="36" stroke="#334" stroke-width="1.8"/>
  <line x1="38" y1="36" x2="43" y2="36" stroke="#334" stroke-width="1.5"/>
  <line x1="76" y1="36" x2="82" y2="36" stroke="#334" stroke-width="1.5"/>

  <!-- Eyes — behind glasses, focused -->
  <circle cx="51" cy="37" r="3.2" fill="#2C1A0E"/>
  <circle cx="68" cy="37" r="3.2" fill="#2C1A0E"/>
  <circle cx="52.5" cy="35.5" r="1" fill="white"/>
  <circle cx="69.5" cy="35.5" r="1" fill="white"/>

  <!-- Eyebrows — slightly furrowed concentration -->
  <path d="M45 29 Q51 27 56 30" stroke="#1A0800" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M63 30 Q68 27 74 29" stroke="#1A0800" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M58 43 Q60 47 62 43" stroke="#E09080" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Subtle focused expression -->
  <path d="M52 51 Q60 54 68 51" stroke="#C07060" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="45" cy="46" rx="5" ry="3" fill="#FFB0A0" opacity="0.25"/>
  <ellipse cx="75" cy="46" rx="5" ry="3" fill="#FFB0A0" opacity="0.25"/>
</svg>
