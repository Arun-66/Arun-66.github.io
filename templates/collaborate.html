{% extends "base.html" %}
{% block content %}

<div class="max-w-4xl mx-auto px-6 py-20">

  <div class="mb-14">
    <div class="eyebrow mb-4">Contact</div>
    <h1 class="font-heading font-semibold text-3xl md:text-4xl tracking-tight text-base-content leading-tight">Collaborate</h1>
    <p class="mt-3 text-sm text-base-content/55 max-w-lg leading-relaxed font-light">
      I'm open to conversations with researchers, faculty, and engineers working on adjacent problems.
    </p>
  </div>

  <div class="border-t border-base-200/60 pt-10">
    <div class="prose prose-sm md:prose-base max-w-2xl
                prose-a:text-primary prose-a:no-underline hover:prose-a:underline
                prose-headings:font-heading prose-headings:font-semibold prose-headings:tracking-tight
                dark:prose-invert">
      {{ content }}
    </div>
  </div>

</div>

{% endblock %}
